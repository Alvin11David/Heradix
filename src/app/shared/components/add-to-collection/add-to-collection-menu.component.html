<div class="amx-acm-backdrop" (click)="onBackdropClick($event)">
  <div class="amx-acm__panel">


    <div class="amx-acm__gated" *ngIf="!isPremium()">
      <div class="amx-acm__gated-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h4 class="amx-acm__gated-title">Premium Feature</h4>
      <p class="amx-acm__gated-text">Collections are available on Premium and higher plans.</p>
      <a class="amx-acm__gated-cta" href="/pricing">Upgrade to Premium</a>
    </div>


    <div class="amx-acm__state" *ngIf="isPremium() && loading()">
      <div class="amx-acm__spinner"></div>
      <span>Loading collections…</span>
    </div>


    <div class="amx-acm__state" *ngIf="isPremium() && !loading() && error()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>{{ error() }}</span>
      <button class="amx-acm__retry" (click)="collectionsSvc.loadCollections()">Retry</button>
    </div>


    <ng-container *ngIf="isPremium() && !loading() && !error()">
      <div class="amx-acm__header">
        <span class="amx-acm__title">Save to collection</span>
        <span class="amx-acm__saved-badge" *ngIf="savedCount() > 0">Saved in {{ savedCount() }}</span>
      </div>

      <div class="amx-acm__list">

        <div class="amx-acm__empty" *ngIf="collections().length === 0">
          <p>No collections yet. Create your first one below.</p>
        </div>


        <button class="amx-acm__item"
                *ngFor="let col of collections()"
                [class.amx-acm__item--saved]="isSaved(col.id)"
                [disabled]="saving().has(col.id)"
                (click)="toggleCollection(col.id)">
          <span class="amx-acm__item-check">
            <svg *ngIf="isSaved(col.id)" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
          </span>
          <span class="amx-acm__item-thumb" *ngIf="col.coverThumbnailUrl">
            <img [src]="col.coverThumbnailUrl" [alt]="col.name" loading="lazy"/>
          </span>
          <span class="amx-acm__item-info">
            <span class="amx-acm__item-name">{{ col.name }}</span>
            <span class="amx-acm__item-count">{{ col.assetCount }} item{{ col.assetCount !== 1 ? 's' : '' }}</span>
          </span>
          <span class="amx-acm__item-spinner" *ngIf="saving().has(col.id)">
            <span class="amx-acm__mini-spin"></span>
          </span>
        </button>
      </div>


      <div class="amx-acm__create">
        <div class="amx-acm__create-row">
          <input class="amx-acm__create-input"
                 type="text"
                 placeholder="New collection name"
                 [ngModel]="newName()"
                 (ngModelChange)="newName.set($event)"
                 [disabled]="creating()"
                 (keydown.enter)="createCollection()"/>
          <button class="amx-acm__create-btn"
                  [disabled]="creating() || !newName().trim()"
                  (click)="createCollection()">
            <span *ngIf="!creating()">Create</span>
            <span class="amx-acm__mini-spin" *ngIf="creating()"></span>
          </button>
        </div>
        <p class="amx-acm__create-error" *ngIf="createError()">{{ createError() }}</p>
      </div>
    </ng-container>

  </div>
</div>
